
---
apiVersion: apps/v1
kind: Deployment
metadata:
 mc-project
spec:
 replicas: 3
 selector:
  matchLabels:
   app: mc
 template:
  metadata:
   labels:
    app: mc
  spec:
  - containers:
     name: mc-pod
     image: dockrepo1:12
     ports:
     - containerPort: 8080

---
apiVersion: v1
kind: Service
metadata: 
 mc-service
spec:
 type: LoadBalancer
 selector:
  app: mc
 ports:
 - port: 8080
   targetPort: 8080
   protocol: TCP
